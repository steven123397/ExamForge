name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  UV_VERSION: "0.11.2"

jobs:
  quick:
    name: 快速门禁
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: 配置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 配置 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: apps/scheduler/uv.lock

      - name: 安装 Node.js 依赖
        run: npm ci

      - name: 检查仓库治理规则
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            npm run check:ci -- --base "$PR_BASE_SHA" --head "$GITHUB_SHA"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            npm run check:ci -- --base "$PUSH_BASE_SHA" --head "$GITHUB_SHA"
          else
            npm run check:ci -- --head "$GITHUB_SHA"
          fi

      - name: 测试 CI 治理脚本
        run: npm run test:ci

      - name: 类型检查
        run: npm run typecheck

      - name: API 测试
        run: npm test
        env:
          LOG_LEVEL: silent

      - name: Scheduler 测试
        run: npm run test:scheduler

      - name: 生产构建
        run: npm run build

  postgres:
    name: PostgreSQL 与迁移门禁
    needs: quick
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: examforge
          POSTGRES_PASSWORD: examforge
          POSTGRES_DB: examforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U examforge -d examforge_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgres://examforge:examforge@127.0.0.1:5432/examforge_test
      TEST_DATABASE_URL: postgres://examforge:examforge@127.0.0.1:5432/examforge_test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 迁移测试
        run: npm run test:migrations

      - name: 空库迁移与幂等检查
        run: npm run db:check-migrations

      - name: 正式迁移入口
        run: npm run db:migrate

      - name: PostgreSQL 集成测试
        run: npm run test:postgres

  e2e:
    name: Compose 与 Playwright 门禁
    needs: quick
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      COMPOSE_PROJECT_NAME: examforge-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 配置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 安装 Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: 运行完整演示验收
        run: npm run test:e2e:demo
        env:
          KEEP_DEMO_STACK: "1"

      - name: 收集失败诊断
        if: failure()
        run: |
          mkdir -p test-results
          docker compose ps --all > test-results/compose-ps.txt || true
          docker compose logs --no-color > test-results/compose.log || true

      - name: 清理 Compose 环境
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: 上传失败报告
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
