name: 发布不可变镜像

on:
  workflow_dispatch:
    inputs:
      public_origin:
        description: Web 构建使用的正式 HTTPS Origin
        required: true
        default: https://examforge.site
        type: string
      confirm_publish:
        description: 确认构建、扫描并推送四个镜像到 TCR
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-images-${{ github.sha }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.22.2"
  NPM_VERSION: "12.0.1"
  UV_VERSION: "0.11.2"
  SYFT_VERSION: "1.44.0"
  TRIVY_VERSION: "0.72.0"
  SYFT_IMAGE: docker.io/anchore/syft:v1.44.0@sha256:2baa4d24d90599840c0100a8d30deaa533821fcd99f405ce6f90e3d225bd836d
  TRIVY_IMAGE: docker.io/aquasec/trivy:0.72.0@sha256:c6e969c5662a546ad5de4a73c2a6b7a7c627f86d916903e175aa623af5b97ada

jobs:
  quality:
    name: 发布前质量门禁
    if: ${{ inputs.confirm_publish }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PUBLIC_ORIGIN: ${{ inputs.public_origin }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: 配置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 配置 uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: apps/scheduler/uv.lock

      - name: 固定 npm 版本
        run: |
          npm install --global --prefix "$RUNNER_TEMP/npm12" --ignore-scripts --no-fund --no-audit "npm@${NPM_VERSION}"
          echo "$RUNNER_TEMP/npm12/bin" >> "$GITHUB_PATH"

      - name: 校验发布输入
        run: |
          set -Eeuo pipefail
          [[ "$PUBLIC_ORIGIN" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          [[ "$GITHUB_SHA" =~ ^[a-f0-9]{40}$ ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]

      - name: 安装依赖
        run: npm ci

      - name: 检查安装脚本和依赖审计
        run: |
          set -Eeuo pipefail
          npm run check:install-scripts
          mkdir -p "$RUNNER_TEMP/release-bundle/audit"
          npm audit --omit=dev --audit-level=moderate --json > "$RUNNER_TEMP/release-bundle/audit/npm-audit.json"

      - name: 运行发布前门禁
        env:
          LOG_LEVEL: silent
        run: |
          npm run test:ci
          npm run test:deploy
          npm run check:ci -- --head "$GITHUB_SHA"
          npm run typecheck
          npm test
          npm run test:scheduler
          npm run check:scheduler-openapi
          npm run build

      - name: 上传生产依赖审计
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-bundle/audit
          if-no-files-found: error
          retention-days: 30

  release:
    name: 构建、扫描并推送镜像
    needs: quality
    runs-on: [self-hosted, linux, x64, examforge-release]
    timeout-minutes: 120
    env:
      PUBLIC_ORIGIN: ${{ inputs.public_origin }}
      TCR_REGISTRY: ${{ vars.TCR_REGISTRY }}
      TCR_NAMESPACE: ${{ vars.TCR_NAMESPACE }}
      TCR_USERNAME: ${{ vars.TCR_USERNAME }}
      SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: 配置 Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: 校验本地 Docker Engine Buildx
        run: |
          set -Eeuo pipefail
          docker buildx use default
          builder_info=$(docker buildx inspect default)
          printf '%s\n' "$builder_info"
          grep -Eq '^Driver:[[:space:]]+docker$' <<< "$builder_info"
          grep -Eq '^Status:[[:space:]]+running$' <<< "$builder_info"
          grep -Eq 'Platforms:.*linux/amd64' <<< "$builder_info"

      - name: 下载生产依赖审计
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/release-bundle/audit

      - name: 校验 Runner 检出与发布输入
        run: |
          set -Eeuo pipefail
          [[ "$(git rev-parse HEAD)" == "$GITHUB_SHA" ]]
          [[ -z "$(git status --short)" ]]
          [[ "$GITHUB_REF" == refs/heads/main ]]
          [[ "$PUBLIC_ORIGIN" =~ ^https://[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          [[ "$TCR_REGISTRY" =~ ^[A-Za-z0-9.-]+(:[0-9]+)?$ ]]
          [[ "$TCR_NAMESPACE" =~ ^[a-z0-9][a-z0-9._-]*$ ]]
          [[ -n "$TCR_USERNAME" ]]

      - name: 计算确定性源码元数据
        id: source
        run: |
          created_at=$(git show -s --format=%cI "$GITHUB_SHA")
          created_at=$(date --utc --date="$created_at" +'%Y-%m-%dT%H:%M:%S.000Z')
          echo "created_at=$created_at" >> "$GITHUB_OUTPUT"

      - name: 构建并执行职责隔离探针
        env:
          SOURCE_CREATED_AT: ${{ steps.source.outputs.created_at }}
        run: |
          set -Eeuo pipefail
          status_file="$RUNNER_TEMP/release-bundle/build-status.log"
          log_directory="$RUNNER_TEMP/release-bundle/build-logs"
          : > "$status_file"
          for name in api scheduler web worker; do
            printf 'timestamp=%s image=%s attempt=0 status=pending reason=not_started\n' \
              "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" "$name" >> "$status_file"
          done
          for name in api scheduler web worker; do
            dockerfile="apps/$name/Dockerfile"
            repository="$TCR_REGISTRY/$TCR_NAMESPACE/$name"
            image_ref="$repository:$GITHUB_SHA"
            mkdir -p "$RUNNER_TEMP/release-bundle/images/$name"
            EXAMFORGE_BUILD_STATUS_FILE="$status_file" \
            EXAMFORGE_BUILD_LOG_DIR="$log_directory" \
            SOURCE_REVISION="$GITHUB_SHA" \
              bash scripts/release/build-image.sh "$image_ref" "$name" "$dockerfile"
            bash scripts/release/probe-image.sh "$image_ref" "$name" "$GITHUB_SHA" "$PUBLIC_ORIGIN"
          done

      - name: 生成四个镜像 SBOM
        run: |
          set -Eeuo pipefail
          for name in api scheduler web worker; do
            image_ref="$TCR_REGISTRY/$TCR_NAMESPACE/$name:$GITHUB_SHA"
            output_dir="$RUNNER_TEMP/release-bundle/images/$name"
            docker run --rm \
              --volume /var/run/docker.sock:/var/run/docker.sock \
              --volume "$output_dir:/out" \
              "$SYFT_IMAGE" "$image_ref" --output spdx-json=/out/sbom.spdx.json
          done

      - name: 扫描 HIGH/CRITICAL 漏洞
        run: |
          set -Eeuo pipefail
          for name in api scheduler web worker; do
            image_ref="$TCR_REGISTRY/$TCR_NAMESPACE/$name:$GITHUB_SHA"
            output_dir="$RUNNER_TEMP/release-bundle/images/$name"
            docker run --rm \
              --volume /var/run/docker.sock:/var/run/docker.sock \
              --volume "$output_dir:/out" \
              --volume examforge-trivy-cache:/root/.cache/ \
              "$TRIVY_IMAGE" image \
              --format json \
              --output /out/trivy.json \
              --exit-code 1 \
              --ignore-unfixed \
              --scanners vuln \
              --skip-version-check \
              --db-repository ghcr.io/aquasecurity/trivy-db:2 \
              --severity HIGH,CRITICAL \
              --pkg-types os,library \
              "$image_ref"
          done

      - name: 登录 TCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ vars.TCR_REGISTRY }}
          username: ${{ vars.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: 推送通过门禁的镜像
        env:
          SOURCE_CREATED_AT: ${{ steps.source.outputs.created_at }}
        run: |
          set -Eeuo pipefail
          status_file="$RUNNER_TEMP/release-bundle/push-status.log"
          log_directory="$RUNNER_TEMP/release-bundle/push-logs"
          : > "$status_file"
          for name in api scheduler web worker; do
            printf 'timestamp=%s image=%s attempt=0 status=pending reason=not_started\n' \
              "$(date --utc +'%Y-%m-%dT%H:%M:%SZ')" "$name" >> "$status_file"
          done
          for name in api scheduler web worker; do
            repository="$TCR_REGISTRY/$TCR_NAMESPACE/$name"
            image_ref="$repository:$GITHUB_SHA"
            digest_file="$RUNNER_TEMP/release-bundle/images/$name/registry-digest.txt"
            EXAMFORGE_PUSH_STATUS_FILE="$status_file" \
            EXAMFORGE_PUSH_LOG_DIR="$log_directory" \
              bash scripts/release/push-image.sh "$image_ref" "$name" "$digest_file"
            digest=$(< "$digest_file")
            [[ "$digest" =~ ^sha256:[a-f0-9]{64}$ ]]
            node scripts/release/create-image-fragment.mjs \
              --output "$RUNNER_TEMP/release-bundle/images/$name/fragment.json" \
              --name "$name" \
              --repository "$repository" \
              --tag "$GITHUB_SHA" \
              --digest "$digest" \
              --commit "$GITHUB_SHA" \
              --source-url "$SOURCE_URL" \
              --syft-version "$SYFT_VERSION" \
              --trivy-version "$TRIVY_VERSION"
          done

      - name: 生成并校验发布清单
        env:
          SOURCE_CREATED_AT: ${{ steps.source.outputs.created_at }}
        run: |
          node scripts/release/create-release-manifest.mjs \
            --input "$RUNNER_TEMP/release-bundle/images" \
            --audit "$RUNNER_TEMP/release-bundle/audit/npm-audit.json" \
            --output "$RUNNER_TEMP/release-bundle/release-manifest.json" \
            --commit "$GITHUB_SHA" \
            --created-at "$SOURCE_CREATED_AT" \
            --source-url "$SOURCE_URL" \
            --public-origin "$PUBLIC_ORIGIN" \
            --npm-version "$NPM_VERSION"
          node scripts/release/verify-release.mjs \
            "$RUNNER_TEMP/release-bundle/release-manifest.json" \
            --expected-commit "$GITHUB_SHA" \
            --verify-files

      - name: 上传发布清单、SBOM 与扫描报告
        id: release_artifact_upload
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examforge-release-${{ github.sha }}
          path: ${{ runner.temp }}/release-bundle
          if-no-files-found: error
          retention-days: 90

      - name: 等待发布 artifact 重试
        if: ${{ steps.release_artifact_upload.outcome == 'failure' }}
        run: sleep 5

      - name: 重试上传发布清单、SBOM 与扫描报告
        if: ${{ steps.release_artifact_upload.outcome == 'failure' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examforge-release-${{ github.sha }}
          path: ${{ runner.temp }}/release-bundle
          if-no-files-found: error
          retention-days: 90
          overwrite: true

      - name: 上传失败诊断
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examforge-release-failure-${{ github.sha }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/release-bundle/build-status.log
            ${{ runner.temp }}/release-bundle/build-logs
            ${{ runner.temp }}/release-bundle/push-status.log
            ${{ runner.temp }}/release-bundle/push-logs
          if-no-files-found: warn
          retention-days: 30

      - name: 清理本地发布凭据与临时报告
        if: ${{ always() }}
        run: |
          set +e
          docker logout "$TCR_REGISTRY"
          rm -rf "$RUNNER_TEMP/release-bundle"
