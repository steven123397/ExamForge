services:
  postgres:
    image: postgres:16-alpine
    container_name: examforge-postgres
    environment:
      POSTGRES_USER: examforge
      POSTGRES_PASSWORD: examforge
      POSTGRES_DB: examforge
    ports:
      - "5432:5432"
    volumes:
      - examforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U examforge -d examforge"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  examforge-postgres-data:
