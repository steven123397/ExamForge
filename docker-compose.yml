services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-examforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-examforge}
      POSTGRES_DB: ${POSTGRES_DB:-examforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - examforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: ${COMPOSE_PROJECT_NAME:-examforge}-api:demo
    pull_policy: never
    working_dir: /app
    command: ["node", "packages/db/dist/migrations.js"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-examforge}:${POSTGRES_PASSWORD:-examforge}@postgres:5432/${POSTGRES_DB:-examforge}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    image: ${COMPOSE_PROJECT_NAME:-examforge}-api:demo
    pull_policy: never
    working_dir: /app
    command: ["node", "packages/db/dist/seed.js"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-examforge}:${POSTGRES_PASSWORD:-examforge}@postgres:5432/${POSTGRES_DB:-examforge}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    image: ${COMPOSE_PROJECT_NAME:-examforge}-api:demo
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-examforge}:${POSTGRES_PASSWORD:-examforge}@postgres:5432/${POSTGRES_DB:-examforge}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCHEDULER_PYTHON: uv
      EXAMFORGE_ADMIN_PASSWORD: ${EXAMFORGE_ADMIN_PASSWORD:-}
      EXAMFORGE_OPERATOR_PASSWORD: ${EXAMFORGE_OPERATOR_PASSWORD:-}
      EXAMFORGE_TEACHER_PASSWORD: ${EXAMFORGE_TEACHER_PASSWORD:-}
      EXAMFORGE_STUDENT_PASSWORD: ${EXAMFORGE_STUDENT_PASSWORD:-}
      EXAMFORGE_TRUSTED_ORIGINS: ${EXAMFORGE_TRUSTED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      EXAMFORGE_SESSION_COOKIE_SECURE: ${EXAMFORGE_SESSION_COOKIE_SECURE:-false}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  web:
    image: ${COMPOSE_PROJECT_NAME:-examforge}-web:demo
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  examforge-postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-examforge}-demo-postgres-data
